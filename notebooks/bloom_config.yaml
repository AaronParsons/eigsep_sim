# BLOOM-21cm lunar simulation — single source of truth for all base parameters.
# Derived quantities (orbital period, beam kh, noise, etc.) are computed by
# SimConfig in sim_config.py from these values.

spacecraft:
  opening_angle_deg: 90.0
  arm_lengths_m: [6.0, 4.0]        # full tip-to-tip length of each rod (m)
  arm_masses_kg: [1.0, 2.25]       # mass of each rod (kg)
  l_hat_raw: [1.0, 0.0, 0.2]       # angular momentum direction; normalised in SimConfig

antenna:
  r_loss_ohm: 5.0                   # lumped antenna / lead resistance (Ω)
  z_rx_ohm: 50.0                    # receiver input resistance (Ω)
  x_scale: 120.0                    # reactance model scale factor
  t_rx_K: 100.0                     # receiver noise temperature (K)

observation:
  freq_hz: 100.0e+6                 # analysis frequency (Hz)
  nside: 8                          # HEALPix resolution
  t_regolith_K: 300.0               # truth: lunar surface temperature (K)
  t_sun_K: 5000.0                   # truth: effective sun pixel temperature at nside=8 (K)
  altitude_m: 150.0e+3              # orbital altitude above lunar surface (m)
  n_days: 60                        # length of observation window (days)
  n_obs_per_orbit: 14400            # time samples per orbit (= 4 × 3600)
  # t_integration_s is now DERIVED from n_days, duty_cycle, n_obs, and
  # attitude_knowledge_deg / spin_period_s (see OrbiterMission / Observation).
  band_low_mhz: 0.0                 # low edge of processed receiver band (MHz)
  band_high_mhz: 200.0              # high edge of processed receiver band (MHz)
  nchan: 512                        # number of frequency channels in full receiver band
  # Science / analysis frequency grid (used by multi-frequency notebook & tests)
  freq_min_mhz: 55.0                # low edge of science frequency grid (MHz)
  freq_max_mhz: 115.0               # high edge of science frequency grid (MHz)
  nchan_science: 30                 # number of science frequency channels
  # Observing duty cycle: fraction of total time spent collecting science data
  # 22/24 ≈ 0.917 — two hours per day lost to housekeeping / eclipse / calibration
  duty_cycle: 0.917
  # Attitude-knowledge constraint on maximum integration time
  attitude_knowledge_deg: 1.0       # 1-sigma pointing knowledge (deg)
  spin_period_s: 600.0              # spacecraft spin period (s; 10 min)
  fixed_spin: false                 # false = ergodic tumbling; true = spin around l_hat
  obs_epoch: "2025-01-01"           # observation start (ISO date, parsed by astropy.Time)
  orbit_normals:
    frame: equatorial               # coordinate frame of the vectors below:
                                    #   "equatorial" (ICRS) — transformed to galactic in SimConfig
                                    #   "galactic"          — used directly as-is
    vectors:
      - [0.0, 0.0, 1.0]             #   equatorial orbit — normal = celestial north pole
      - [1.0, 0.0, 0.0]             #   polar orbit      — normal along vernal equinox

mission:
  spin_rate_rpm: 0.5                # body rotation rate (RPM)
  eff_geom_rate_deg_s: 0.15        # effective beam / Moon / sky angular rate (deg/s)
  science_band_low_mhz: 30.0       # low edge of extended science / data band (MHz)
  science_band_high_mhz: 170.0     # high edge of extended science / data band (MHz)
  mission_duration_days: 60        # nominal mission span for requirements checks (days)
  mission_duration_ext_days: 365   # extended mission duration (days; 1 year)
  synodic_month_days: 29.53        # synodic lunar month (days)
  modulation_min: 0.18             # minimum sky modulation fraction over campaign
  sky_fraction_meeting_modulation: 0.95
  trx_frac_of_tsky_max: 0.30       # T_rx / <T_sky> over science band

analysis:
  n_eig_modes: 4           # GSM eigenmode filter order (FG leakage sweet spot)
  snr_threshold: 10.0      # detection requirement: SNR_combined must exceed this value
  tracker_hz: 1.0          # star-tracker readout rate [Hz]
  t_accum_s: 1.0           # hardware accumulation time per transmitted spectrum [s]
  bytes_per_sample: 4      # bytes per sample (float32)
  downlink_mbperhr: 60.0   # X-band downlink capacity per spacecraft [MB/hr]
  n_substeps: 50           # ODE sub-steps per T_ACCUM window (tumbling trajectory model)
  n_windows: 20            # T_ACCUM windows sampled for statistics (trajectory model)
  ref_freq_mhz: 80.0       # representative science frequency for single-freq analyses [MHz]
